<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ders Başvurusu | Eğitmen Halil</title>
  <meta name="description" content="Yazılım ve yapay zeka derslerine başvuru formu. Profesyonel eğitimler için hemen kaydolun.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <style>
    .apply-container {
      max-width: 800px;
      margin: 120px auto 60px;
      padding: 0 20px;
    }
    
    .apply-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .apply-header h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .apply-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 48px;
    }
    
    .form-section {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    
    .form-section h3 {
      font-size: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .form-section h3 i {
      color: var(--accent);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 15px;
      color: var(--text-primary);
      transition: var(--transition);
      outline: none;
      font-family: inherit;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    
    .course-options {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }
    
    .course-checkbox {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .course-checkbox:hover {
      border-color: var(--accent);
    }
    
    .course-checkbox input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    
    .btn-submit {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }
    
    .back-to-home {
      position: fixed;
      top: 20px;
      left: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 10px 20px;
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 100;
      transition: var(--transition);
    }
    
    .back-to-home:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .success-message {
      text-align: center;
      padding: 40px;
    }
    
    .success-message i {
      font-size: 64px;
      color: #10b981;
      margin-bottom: 20px;
    }
    
    .hidden {
      display: none;
    }
    
    @media (max-width: 768px) {
      .apply-card { padding: 24px; }
      .form-row { grid-template-columns: 1fr; }
      .apply-header h1 { font-size: 32px; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-to-home">
    <i class="fas fa-arrow-left"></i> Ana Sayfaya Dön
  </a>

  <div class="apply-container">
    <div class="apply-header">
      <span class="section-tag"><i class="fas fa-graduation-cap"></i> Kayıt Formu</span>
      <h1>Ders Başvurusu<br><span class="gradient-text">Yap, Kariyerine Yön Ver</span></h1>
      <p>Profesyonel yazılım ve yapay zeka eğitimlerine hemen başvur.</p>
    </div>

    <div class="apply-card" id="applyFormCard">
      <form id="applyForm">
        <div class="form-section">
          <h3><i class="fas fa-user"></i> Kişisel Bilgiler</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Ad Soyad *</label>
              <input type="text" name="fullname" required placeholder="Ahmet Yılmaz">
            </div>
            <div class="form-group">
              <label>E-posta *</label>
              <input type="email" name="email" required placeholder="ahmet@example.com">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Telefon *</label>
              <input type="tel" name="phone" required placeholder="05XX XXX XX XX">
            </div>
            <div class="form-group">
              <label>Yaş</label>
              <input type="number" name="age" placeholder="25">
            </div>
          </div>
          <div class="form-group">
            <label>Eğitim Durumu</label>
            <select name="education">
              <option value="">Seçiniz</option>
              <option>Lise</option>
              <option>Ön Lisans</option>
              <option>Lisans</option>
              <option>Yüksek Lisans</option>
              <option>Doktora</option>
            </select>
          </div>
        </div>

        <div class="form-section">
          <h3><i class="fas fa-laptop-code"></i> Almak İstediğin Dersler</h3>
          <div class="course-options">
            <label class="course-checkbox">
              <input type="checkbox" name="course" value="Modern Web Geliştirme"> Modern Web Geliştirme
            </label>
            <label class="course-checkbox">
              <input type="checkbox" name="course" value="Frontend Ustalık"> Frontend Ustalık
            </label>
            <label class="course-checkbox">
              <input type="checkbox" name="course" value="Backend & API"> Backend & API
            </label>
            <label class="course-checkbox">
              <input type="checkbox" name="course" value="Makine Öğrenmesi"> Makine Öğrenmesi
            </label>
            <label class="course-checkbox">
              <input type="checkbox" name="course" value="Derin Öğrenme"> Derin Öğrenme
            </label>
            <label class="course-checkbox">
              <input type="checkbox" name="course" value="Yapay Zeka Temelleri"> Yapay Zeka Temelleri
            </label>
          </div>
        </div>

        <div class="form-section">
          <h3><i class="fas fa-comment"></i> Ek Bilgiler</h3>
          <div class="form-group">
            <label>Nasıl duydunuz?</label>
            <select name="heardFrom">
              <option value="">Seçiniz</option>
              <option>Google</option>
              <option>Instagram</option>
              <option>LinkedIn</option>
              <option>Arkadaş Tavsiyesi</option>
              <option>Diğer</option>
            </select>
          </div>
          <div class="form-group">
            <label>Eklemek istedikleriniz</label>
            <textarea name="message" rows="4" placeholder="Varsa notlarınız veya sorularınız..."></textarea>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fas fa-paper-plane"></i> Başvuruyu Gönder
        </button>
      </form>
    </div>

    <div id="successMessage" class="apply-card hidden">
      <div class="success-message">
        <i class="fas fa-check-circle"></i>
        <h2>Başvurunuz Alındı!</h2>
        <p>En kısa sürede size dönüş yapacağım.</p>
        <a href="index.html" class="btn btn-primary" style="margin-top: 30px;">Ana Sayfaya Dön</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('applyForm');
    const formCard = document.getElementById('applyFormCard');
    const successDiv = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Form verilerini topla
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      const courses = formData.getAll('course');
      data.courses = courses.join(', ');
      
      // Web3Forms API'ye gönder (veya kendi mail servisin)
      const web3Key = '41c856f1-6f05-44e6-9732-6278487a4dd7';
      
      const submitData = new FormData();
      submitData.append('access_key', web3Key);
      submitData.append('subject', 'Yeni Ders Başvurusu');
      submitData.append('from_name', 'Başvuru Formu');
      submitData.append('name', data.fullname);
      submitData.append('email', data.email);
      submitData.append('phone', data.phone);
      submitData.append('education', data.education || '');
      submitData.append('courses', data.courses);
      submitData.append('message', `Yaş: ${data.age || 'Belirtilmemiş'}\nNasıl duydu: ${data.heardFrom || 'Belirtilmemiş'}\nNotlar: ${data.message || ''}`);
      
      try {
        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: submitData
        });
        const result = await response.json();
        
        if (result.success) {
          formCard.classList.add('hidden');
          successDiv.classList.remove('hidden');
          form.reset();
        } else {
          alert('Bir hata oluştu. Lütfen tekrar deneyin.');
        }
      } catch (error) {
        alert('Bağlantı hatası. Lütfen daha sonra tekrar deneyin.');
      }
    });

    // Dark/Light Mode senkronizasyonu
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</body>
</html>
