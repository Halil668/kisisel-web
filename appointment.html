<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Randevu Al - Eğitmen Halil</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: transparent;
      padding: 20px;
    }
    
    .appointment-form {
      max-width: 100%;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: #0f172a;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
    }
    
    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    .status-message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
    }
    
    .status-message.success {
      display: block;
      background: #10b98120;
      color: #10b981;
      border: 1px solid #10b981;
    }
    
    .status-message.error {
      display: block;
      background: #ef444420;
      color: #ef4444;
      border: 1px solid #ef4444;
    }
    
    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="appointment-form">
    <form id="appointmentForm">
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Ad Soyad *</label>
          <input type="text" name="name" id="name" required placeholder="Ahmet Yılmaz">
        </div>
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> E-posta *</label>
          <input type="email" name="email" id="email" required placeholder="ornek@mail.com">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-phone"></i> Telefon *</label>
          <input type="tel" name="phone" id="phone" required placeholder="05XX XXX XX XX">
        </div>
        <div class="form-group">
          <label><i class="fas fa-calendar"></i> Tarih *</label>
          <input type="date" name="date" id="date" required>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-clock"></i> Saat *</label>
          <select name="time" id="time" required>
            <option value="">Saat seçin</option>
            <option value="09:00">09:00</option>
            <option value="10:00">10:00</option>
            <option value="11:00">11:00</option>
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="14:00">14:00</option>
            <option value="15:00">15:00</option>
            <option value="16:00">16:00</option>
            <option value="17:00">17:00</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fas fa-comment"></i> Görüşme Konusu</label>
          <select name="topic" id="topic">
            <option value="">Seçiniz</option>
            <option value="Yazılım Eğitimi">Yazılım Eğitimi</option>
            <option value="Yapay Zeka Danışmanlık">Yapay Zeka Danışmanlık</option>
            <option value="Proje Teklifi">Proje Teklifi</option>
            <option value="Diğer">Diğer</option>
          </select>
        </div>
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-info-circle"></i> Not / Mesaj</label>
        <textarea name="message" id="message" rows="3" placeholder="Eklemek istedikleriniz..."></textarea>
      </div>
      
      <button type="submit" class="submit-btn" id="submitBtn">
        <i class="fas fa-calendar-check"></i> Randevu Al
      </button>
      <div id="formStatus" class="status-message"></div>
    </form>
  </div>
  
  <script>
    const form = document.getElementById('appointmentForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('formStatus');
    
    // Bugünün tarihini min olarak ayarla
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').min = today;
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;
      const topic = document.getElementById('topic').value;
      const message = document.getElementById('message').value;
      
      if (!name || !email || !phone || !date || !time) {
        statusDiv.className = 'status-message error';
        statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Lütfen tüm zorunlu alanları doldurun!';
        setTimeout(() => statusDiv.className = 'status-message', 3000);
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gönderiliyor...';
      
      // Web3Forms ile bildirim gönder
      const formData = new FormData();
      formData.append('access_key', '41c856f1-6f05-44e6-9732-6278487a4dd7');
      formData.append('subject', '🔔 YENİ RANDEVU TALEBİ');
      formData.append('from_name', 'Randevu Sistemi');
      formData.append('name', name);
      formData.append('email', email);
      formData.append('phone', phone);
      formData.append('date', date);
      formData.append('time', time);
      formData.append('topic', topic);
      formData.append('message', `📅 RANDEVU DETAYLARI:\n\n👤 Ad Soyad: ${name}\n📧 E-posta: ${email}\n📞 Telefon: ${phone}\n📆 Tarih: ${date}\n⏰ Saat: ${time}\n📌 Konu: ${topic || 'Belirtilmemiş'}\n💬 Not: ${message || 'Yok'}`);
      
      try {
        const res = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: formData
        });
        const json = await res.json();
        
        if (json.success) {
          statusDiv.className = 'status-message success';
          statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Randevu talebiniz alındı! En kısa sürede size dönüş yapacağım.';
          form.reset();
          
          // Ayrıca WhatsApp bildirimi (isteğe bağlı)
          const whatsappMsg = encodeURIComponent(`Merhaba, yeni bir randevu talebi var:\n\nAd Soyad: ${name}\nTarih: ${date}\nSaat: ${time}\nKonu: ${topic}\nTelefon: ${phone}`);
          
          setTimeout(() => {
            statusDiv.className = 'status-message';
          }, 5000);
        } else {
          throw new Error();
        }
      } catch (error) {
        statusDiv.className = 'status-message error';
        statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Bir hata oluştu. Lütfen tekrar deneyin veya WhatsApp ile iletişime geçin.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-calendar-check"></i> Randevu Al';
      }
    });
  </script>
</body>
</html>
